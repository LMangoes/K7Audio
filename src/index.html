<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self' file: data:; script-src 'self'; style-src 'self' 'unsafe-inline';" />
<title>K7 Audio</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <header class="titlebar">
    <span class="brand">K7<span class="brand-accent">/</span>AUDIO</span>
    <span class="brand-sub">LOCAL LIBRARY PLAYER</span>
  </header>

  <div class="layout">

    <nav class="sidebar">
      <div class="nav-item active" data-view="all">
        <span class="nav-item-label">ALL TRACKS</span>
        <button class="nav-play-btn" data-view="all" title="Play All Tracks">►</button>
      </div>
      <div class="nav-item" data-view="artists">
        <span class="nav-item-label">ARTISTS / ALBUMS</span>
      </div>
      <div class="nav-item" data-view="genres">
        <span class="nav-item-label">GENRES</span>
      </div>
      <div class="nav-item" data-view="favourites">
        <span class="nav-item-label">♥ FAVOURITES</span>
        <button class="nav-play-btn" data-view="favourites" title="Play Favourites">►</button>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">
          <span>PLAYLISTS</span>
          <button id="new-playlist-btn" class="mini-btn" title="New playlist">+</button>
        </div>
        <div id="playlist-list" class="playlist-list"></div>
      </div>

      <div class="sidebar-footer">
        <div class="sidebar-label"><span>LIBRARY FOLDERS</span></div>
        <div id="library-paths" class="library-paths"></div>
        <div class="folder-actions">
          <button id="add-folder-btn" class="mini-btn wide">+ ADD FOLDER</button>
          <button id="rescan-btn" class="mini-btn wide">RESCAN</button>
        </div>
        <div id="scan-status" class="scan-status"></div>
      </div>
    </nav>

    <main class="content">
      <div class="content-header">
        <h2 id="view-title">ALL TRACKS</h2>
        <div class="content-tools">
          <button id="settings-btn" class="mini-btn" title="Settings">⋮</button>
          <div class="search-wrap">
            <input id="search-input" class="search-input" type="text" placeholder="FILTER TRACKS / GENRE..." />
            <button id="search-clear" class="search-clear" title="Clear filter" aria-label="Clear filter">×</button>
          </div>
          <select id="sort-select" class="sort-select">
            <option value="artist-album">SORT: ARTIST / ALBUM</option>
            <option value="title">SORT: TITLE A-Z</option>
            <option value="genre">SORT: GENRE</option>
          </select>
        </div>
      </div>
      <div id="view-root" class="view-root"></div>
    </main>

  </div>

  <footer class="transport">
    <div class="reels" id="reels">
      <div class="reel" id="reel-l"><div class="reel-hub"></div></div>
      <div class="reel" id="reel-r"><div class="reel-hub"></div></div>
    </div>

    <div class="now-playing">
      <div class="marquee-wrap">
        <div class="marquee" id="now-title">NO TRACK LOADED</div>
      </div>
      <div class="now-artist" id="now-artist">—</div>
      <div class="now-source" id="now-source"></div>
    </div>

    <div class="transport-center">
      <div class="transport-controls">
        <button id="btn-shuffle" class="ctrl" title="Shuffle">SHF</button>
        <button id="btn-prev" class="ctrl" title="Previous">◄◄</button>
        <button id="btn-playpause" class="ctrl primary" title="Play/Pause">►</button>
        <button id="btn-next" class="ctrl" title="Next">►►</button>
        <button id="btn-repeat" class="ctrl" title="Repeat">RPT</button>
      </div>
      <div class="seek-wrap">
        <span id="time-current" class="time">00:00</span>
        <div class="seek-led" id="seek-led">
          <div class="seek-led-fill" id="seek-led-fill"></div>
          <input type="range" id="seek-range" class="seek-range" min="0" max="1000" value="0" />
        </div>
        <span id="time-total" class="time">00:00</span>
      </div>
      <canvas id="visualizer-canvas" class="visualizer"></canvas>
    </div>

    <div class="volume-wrap">
      <span class="vol-icon">VOL</span>
      <div class="volume-led" id="volume-led">
        <div class="volume-led-fill" id="volume-led-fill"></div>
        <input type="range" id="volume-range" min="0" max="100" value="80" />
      </div>
      <span class="vol-value" id="vol-value">80</span>
    </div>
  </footer>

  <div id="modal-root"></div>
  <div id="toast-root" class="toast-root"></div>
</div>

<audio id="audio-el" preload="metadata"></audio>

<script src="player.js"></script>
<script src="visualizer.js"></script>
<script src="app.js"></script>
</body>
</html>
